<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony | Cloud Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #000; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; }
        .mono { font-family: 'Geist Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); }
        .editor-box { background: #050505; border: 1px solid #1a1a1a; color: #60a5fa; }
        [x-cloak] { display: none !important; }
        
        /* Anti-gravity Animations */
        .float { animation: floating 6s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body x-data="harmonyCloud">

    <nav class="fixed top-0 w-full z-[100] px-6 py-5 flex justify-between items-center glass border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-white rounded-full flex items-center justify-center">
                <div class="w-3 h-3 bg-black rounded-full animate-pulse"></div>
            </div>
            <span class="font-black tracking-tighter text-xl">Harmony</span>
        </div>
        <div class="flex gap-4">
            <button @click="view = 'edit'" :class="view === 'edit' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest">New</button>
            <button @click="view = 'list'" :class="view === 'list' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest">Archive</button>
        </div>
    </nav>

    <main class="h-screen pt-24 pb-12 overflow-y-auto px-6 max-w-2xl mx-auto">
        
        <div x-show="view === 'edit'" x-transition>
            <div class="mb-8">
                <h1 class="text-4xl font-extrabold tracking-tighter mb-2">Deploy Workspace</h1>
                <p class="text-gray-500 text-sm">Write your code. We'll handle the gravity.</p>
            </div>

            <div class="space-y-4">
                <input type="text" x-model="filename" placeholder="project-name.html" 
                    class="w-full glass rounded-2xl px-6 py-4 outline-none focus:border-blue-500 transition mono text-blue-400">
                
                <textarea x-model="userCode" placeholder="" 
                    class="w-full h-96 editor-box rounded-3xl p-6 outline-none focus:border-blue-500/30 transition resize-none text-sm mono"></textarea>

                <button @click="shipIt" :disabled="!userCode || !filename"
                    class="w-full py-5 bg-white text-black rounded-2xl font-black text-lg active:scale-95 transition disabled:opacity-20 shadow-xl">
                    Deploy on Web
                </button>
            </div>
        </div>

        <div x-show="view === 'list'" x-transition x-cloak>
            <h2 class="text-2xl font-bold mb-6">Active Deployments</h2>
            <div class="space-y-3">
                <template x-for="p in projects" :key="p.id">
                    <div class="glass p-5 rounded-2xl flex justify-between items-center hover:bg-white/[0.05] transition cursor-pointer" @click="preview(p)">
                        <div>
                            <div class="font-bold text-sm" x-text="p.name"></div>
                            <div class="text-[10px] text-gray-500 mono" x-text="p.url"></div>
                        </div>
                        <div class="text-blue-500 text-xs font-bold px-3 py-1 bg-blue-500/10 rounded-full">Open</div>
                    </div>
                </template>
                <template x-if="projects.length === 0">
                    <div class="py-20 text-center text-gray-600 italic">No deployments yet.</div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="showSandbox" x-transition.opacity class="fixed inset-0 z-[200] bg-black flex flex-col" x-cloak>
        <div class="px-6 py-4 flex items-center justify-between border-b border-white/10 glass">
            <button @click="showSandbox = false" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white">← Close Preview</button>
            <div class="mono text-[10px] text-blue-400 truncate max-w-[150px]" x-text="activeProject?.url"></div>
            <div class="flex gap-2">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
            </div>
        </div>
        <iframe x-ref="display" class="w-full flex-1 bg-white"></iframe>
    </div>

    <div x-show="isBuilding" class="fixed inset-0 z-[300] bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center" x-cloak>
        <div class="w-12 h-12 border-2 border-white/10 border-t-white rounded-full animate-spin mb-4"></div>
        <p class="mono text-[10px] tracking-[0.3em] uppercase text-gray-500">Allocating Resources</p>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('harmonyCloud', () => ({
                view: 'edit',
                filename: 'index.html',
                userCode: '',
                isBuilding: false,
                showSandbox: false,
                activeProject: null,
                projects: JSON.parse(localStorage.getItem('harmony_core_v4') || '[]'),

                async shipIt() {
                    this.isBuilding = true;
                    
                    // Simulate the Vercel Build Feel
                    await new Promise(r => setTimeout(r, 1800));

                    const newProject = {
                        id: Date.now(),
                        name: this.filename,
                        code: this.userCode,
                        url: `${this.filename.split('.')[0]}-${Math.random().toString(36).slice(2,7)}.harmony.app`
                    };

                    this.projects.unshift(newProject);
                    localStorage.setItem('harmony_core_v4', JSON.stringify(this.projects));
                    
                    this.isBuilding = false;
                    this.preview(newProject);
                    
                    this.userCode = '';
                    this.filename = 'index.html';
                },

                preview(project) {
                    this.activeProject = project;
                    this.showSandbox = true;
                    
                    // Direct injection into the iframe prevents Blob URL conflicts
                    this.$nextTick(() => {
                        const doc = this.$refs.display.contentWindow.document;
                        doc.open();
                        doc.write(project.code);
                        doc.close();
                    });
                }
            }));
        });
    </script>
</body>
</html>

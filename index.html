<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony | Instant Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #000; color: #fafafa; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'Geist Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        .editor { background: #0a0a0a; border: 1px solid #222; color: #3b82f6; font-family: 'Geist Mono', monospace; }
        [x-cloak] { display: none !important; }
        
        /* Anti-gravity touch */
        .float-slow { animation: float 8s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body x-data="harmonyCloud">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="font-black text-xl tracking-tighter float-slow">Harmony<span class="text-blue-500">.</span></div>
        <div class="flex gap-4">
            <button @click="view = 'editor'" :class="view === 'editor' ? 'text-white' : 'text-gray-500'" class="text-xs uppercase font-bold tracking-widest">Editor</button>
            <button @click="view = 'projects'" :class="view === 'projects' ? 'text-white' : 'text-gray-500'" class="text-xs uppercase font-bold tracking-widest">Deployments</button>
        </div>
    </nav>

    <main class="pt-24 pb-12 px-6 max-w-2xl mx-auto">
        
        <div x-show="view === 'editor'" x-transition>
            <div class="mb-6">
                <h2 class="text-2xl font-bold mb-1">Create New Deployment</h2>
                <p class="text-gray-500 text-sm">Paste your HTML below to ship it to the edge.</p>
            </div>

            <div class="space-y-4">
                <div class="glass p-4 rounded-xl">
                    <label class="block text-[10px] text-gray-500 uppercase font-bold mb-2">Filename</label>
                    <input type="text" x-model="filename" placeholder="index.html" 
                        class="w-full bg-transparent border-none outline-none text-blue-400 mono">
                </div>

                <div class="relative">
                    <label class="absolute top-3 right-4 text-[10px] text-gray-600 uppercase font-bold pointer-events-none">HTML Source</label>
                    <textarea x-model="rawCode" placeholder="<html>...</html>" 
                        class="w-full h-80 editor rounded-2xl p-6 outline-none focus:border-blue-500/50 transition resize-none text-sm"></textarea>
                </div>

                <button @click="deployCode" :disabled="!rawCode || !filename"
                    class="w-full py-4 bg-white text-black rounded-2xl font-black text-lg active:scale-95 transition disabled:opacity-20 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    Deploy on Web
                </button>
            </div>
        </div>

        <div x-show="view === 'projects'" x-transition x-cloak>
            <h2 class="text-2xl font-bold mb-6">Active Deploys</h2>
            <div class="grid gap-4">
                <template x-for="project in deployments" :key="project.id">
                    <div class="glass p-5 rounded-2xl flex justify-between items-center group hover:border-blue-500/30 transition">
                        <div>
                            <div class="font-bold flex items-center gap-2">
                                <span x-text="project.name"></span>
                                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            </div>
                            <div class="text-[10px] text-gray-500 mono" x-text="project.url"></div>
                        </div>
                        <button @click="launch(project.code)" class="text-blue-500 font-bold text-sm bg-blue-500/10 px-4 py-2 rounded-lg">Open</button>
                    </div>
                </template>
                <template x-if="deployments.length === 0">
                    <div class="py-20 text-center text-gray-600 italic">No deployments found.</div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="isDeploying" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center p-10" x-cloak>
        <div class="w-20 h-20 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-6"></div>
        <p class="mono text-xs text-gray-500 uppercase tracking-[0.2em]">Propagating to Global Edge...</p>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('harmonyCloud', () => ({
                view: 'editor',
                filename: 'index.html',
                rawCode: '',
                isDeploying: false,
                deployments: JSON.parse(localStorage.getItem('harmony_v3') || '[]'),

                async deployCode() {
                    this.isDeploying = true;
                    
                    // Simulate build time
                    await new Promise(r => setTimeout(r, 1500));

                    const newId = Date.now();
                    const newProj = {
                        id: newId,
                        name: this.filename,
                        code: this.rawCode,
                        url: `${this.filename.split('.')[0]}-${Math.random().toString(36).slice(2,7)}.harmony.app`
                    };

                    this.deployments.unshift(newProj);
                    localStorage.setItem('harmony_v3', JSON.stringify(this.deployments));
                    
                    this.isDeploying = false;
                    this.view = 'projects';
                    
                    // Automatically launch the one we just made
                    this.launch(this.rawCode);
                    
                    // Reset editor
                    this.rawCode = '';
                    this.filename = 'index.html';
                },

                launch(code) {
                    // This is the "Magic" part: 
                    // It turns your text into a real browser-readable file link
                    const blob = new Blob([code], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    window.open(url, '_blank');
                }
            }));
        });
    </script>
</body>
</html>

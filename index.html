<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony | Blob Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #000; color: #fafafa; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'Geist Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        .editor { background: #0a0a0a; border: 1px solid #222; color: #3b82f6; font-family: 'Geist Mono', monospace; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="harmonyCloud">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="font-black text-xl tracking-tighter">Harmony<span class="text-blue-500">.</span></div>
        <div class="flex gap-6">
            <button @click="view = 'editor'" :class="view === 'editor' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest transition">Editor</button>
            <button @click="view = 'projects'" :class="view === 'projects' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest transition">Deployments</button>
        </div>
    </nav>

    <main class="pt-24 pb-24 px-6 max-w-2xl mx-auto">
        
        <div x-show="view === 'editor'" x-transition>
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-extrabold tracking-tight" x-text="editingId ? 'Edit Code' : 'New Deploy'"></h2>
                    <p class="text-gray-500 text-sm">Launching directly to Blob Storage.</p>
                </div>
                <template x-if="editingId">
                    <button @click="cancelEdit" class="text-xs text-red-500 font-bold mb-1">Cancel</button>
                </template>
            </div>

            <div class="space-y-4">
                <input type="text" x-model="filename" class="w-full glass rounded-2xl px-6 py-4 outline-none focus:border-blue-500 transition text-blue-400 mono">
                <textarea x-model="rawCode" class="w-full h-96 editor rounded-3xl p-6 outline-none focus:border-blue-500/40 transition text-sm"></textarea>
                <button @click="deployCode" :disabled="!rawCode || !filename"
                    class="w-full py-5 bg-white text-black rounded-2xl font-black text-lg active:scale-95 transition">
                    Deploy on Web
                </button>
            </div>
        </div>

        <div x-show="view === 'projects'" x-transition x-cloak>
            <h2 class="text-2xl font-bold mb-6">Active Deploys</h2>
            <div class="grid gap-4">
                <template x-for="project in deployments" :key="project.id">
                    <div class="glass p-5 rounded-2xl border border-white/5">
                        <div class="flex justify-between items-start mb-4">
                            <div class="overflow-hidden pr-2">
                                <div class="font-bold flex items-center gap-2 truncate text-lg" x-text="project.name"></div>
                                <div class="text-[10px] text-gray-600 mono truncate" x-text="project.url"></div>
                            </div>
                            <button @click="deleteProject(project.id)" class="text-gray-800 hover:text-red-500 transition p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                            </button>
                        </div>
                        <div class="flex gap-2">
                            <button @click="launch(project.id)" class="flex-1 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 py-3 rounded-xl text-xs font-bold transition">Open in New Tab</button>
                            <button @click="editProject(project)" class="flex-1 bg-white/5 hover:bg-white/10 text-white py-3 rounded-xl text-xs font-bold transition">Edit</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('harmonyCloud', () => ({
                view: 'editor',
                filename: 'index.html',
                rawCode: '',
                editingId: null,
                deployments: JSON.parse(localStorage.getItem('harmony_blob_v1') || '[]'),
                activeUrls: {}, // Tracks current active Blob URL for each project ID

                editProject(project) {
                    this.editingId = project.id;
                    this.filename = project.name;
                    this.rawCode = project.code;
                    this.view = 'editor';
                },

                cancelEdit() {
                    this.editingId = null;
                    this.filename = 'index.html';
                    this.rawCode = '';
                    this.view = 'projects';
                },

                async deployCode() {
                    if (this.editingId) {
                        const index = this.deployments.findIndex(p => p.id === this.editingId);
                        this.deployments[index].name = this.filename;
                        this.deployments[index].code = this.rawCode;
                        
                        // KILL the old URL so the tab cannot be refreshed to old code
                        if(this.activeUrls[this.editingId]) {
                            URL.revokeObjectURL(this.activeUrls[this.editingId]);
                        }
                    } else {
                        const newId = Date.now();
                        this.deployments.unshift({
                            id: newId,
                            name: this.filename,
                            code: this.rawCode,
                            url: `${this.filename.split('.')[0]}-${Math.random().toString(36).slice(2,7)}.harmony.dev`
                        });
                        this.editingId = newId;
                    }

                    localStorage.setItem('harmony_blob_v1', JSON.stringify(this.deployments));
                    
                    // Launch the new one
                    this.launch(this.editingId);
                    
                    this.editingId = null;
                    this.rawCode = '';
                    this.filename = 'index.html';
                    this.view = 'projects';
                },

                deleteProject(id) {
                    if(confirm('Revoke Deployment? The open tab will no longer refresh.')) {
                        // Kill the link
                        if(this.activeUrls[id]) {
                            URL.revokeObjectURL(this.activeUrls[id]);
                            delete this.activeUrls[id];
                        }
                        this.deployments = this.deployments.filter(p => p.id !== id);
                        localStorage.setItem('harmony_blob_v1', JSON.stringify(this.deployments));
                    }
                },

                launch(id) {
                    const project = this.deployments.find(p => p.id === id);
                    if(!project) return;

                    // Revoke old instance before creating a new one
                    if(this.activeUrls[id]) URL.revokeObjectURL(this.activeUrls[id]);

                    const blob = new Blob([project.code], { type: 'text/html' });
                    const newUrl = URL.createObjectURL(blob);
                    
                    // Register the link so we can kill it later
                    this.activeUrls[id] = newUrl;
                    
                    // Open in true separate tab
                    window.open(newUrl, '_blank');
                }
            }));
        });
    </script>
</body>
</html>

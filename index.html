<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harmony | Web Runtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #000; color: #fafafa; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .mono { font-family: 'Geist Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .editor-area { background: #050505; color: #60a5fa; border: 1px solid #111; }
        [x-cloak] { display: none !important; }
        
        /* Animation for the "Ready" state */
        .pulse-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    </style>
</head>
<body x-data="harmonyRuntime">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="font-black text-xl tracking-tighter">Harmony<span class="text-blue-500">.</span></div>
        <div class="flex gap-4">
            <button @click="view = 'editor'" :class="view === 'editor' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest transition">Editor</button>
            <button @click="view = 'archive'" :class="view === 'archive' ? 'text-white' : 'text-gray-500'" class="text-[10px] uppercase font-bold tracking-widest transition">Ships</button>
        </div>
    </nav>

    <main class="pt-24 pb-20 px-6 max-w-2xl mx-auto">
        
        <div x-show="view === 'editor'" x-transition>
            <div class="mb-6 flex justify-between items-end">
                <div>
                    <h1 class="text-3xl font-black" x-text="editingId ? 'Edit Draft' : 'New Ship'"></h1>
                    <p class="text-gray-500 text-sm">Deploying to the Browser Runtime.</p>
                </div>
                <template x-if="editingId">
                    <button @click="cancelEdit" class="text-xs text-red-500 font-bold mb-1 underline">Discard Edit</button>
                </template>
            </div>

            <div class="space-y-4">
                <div class="glass p-4 rounded-2xl flex items-center">
                    <span class="text-blue-500 mono mr-2">/</span>
                    <input type="text" x-model="filename" placeholder="index.html" class="bg-transparent w-full outline-none mono text-blue-400">
                </div>

                <div class="relative group">
                    <div class="absolute top-4 right-6 flex items-center gap-2">
                        <span class="text-[9px] font-bold text-gray-700 uppercase">Static Web</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 pulse-glow"></div>
                    </div>
                    <textarea x-model="rawCode" placeholder="" 
                        class="w-full h-80 editor-area rounded-3xl p-6 outline-none focus:border-blue-500/40 transition text-xs leading-relaxed mono"></textarea>
                </div>

                <button @click="deploy" :disabled="!rawCode || !filename"
                    class="w-full py-5 bg-white text-black rounded-2xl font-black text-lg active:scale-95 transition-all disabled:opacity-20 shadow-xl">
                    Deploy on Web
                </button>
            </div>
        </div>

        <div x-show="view === 'archive'" x-transition x-cloak>
            <h2 class="text-2xl font-bold mb-6">Active Deployments</h2>
            <div class="space-y-4">
                <template x-for="p in projects" :key="p.id">
                    <div class="glass p-6 rounded-3xl border border-white/5 flex justify-between items-center group">
                        <div class="overflow-hidden mr-4">
                            <div class="font-bold truncate text-lg" x-text="p.name"></div>
                            <div class="text-[10px] text-gray-500 mono truncate" x-text="p.url"></div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="openProject(p)" class="px-4 py-2 bg-blue-500/10 text-blue-400 rounded-xl text-xs font-bold active:bg-blue-500/20">Open</button>
                            <button @click="editProject(p)" class="px-4 py-2 bg-white/5 text-gray-400 rounded-xl text-xs font-bold">Edit</button>
                            <button @click="deleteProject(p.id)" class="p-2 text-gray-800 hover:text-red-500 transition">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
                <template x-if="projects.length === 0">
                    <div class="py-20 text-center text-gray-600 italic">No deployments yet.</div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="previewMode" class="fixed inset-0 z-[100] bg-white flex flex-col" x-cloak x-transition>
        <div class="bg-black p-4 flex justify-between items-center">
            <button @click="closePreview" class="text-[10px] font-bold text-gray-500 uppercase">← Exit Preview</button>
            <div class="text-[9px] mono text-blue-500 truncate px-4" x-text="activeProject?.url"></div>
            <div class="flex gap-1.5">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
            </div>
        </div>
        <iframe x-ref="viewport" class="w-full flex-1 border-none bg-white"></iframe>
    </div>

    <div x-show="isBuilding" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center" x-cloak x-transition>
        <div class="w-10 h-10 border-2 border-white/5 border-t-blue-500 rounded-full animate-spin mb-4"></div>
        <p class="mono text-[10px] text-gray-500 uppercase tracking-[0.4em]">Compiling Assets...</p>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('harmonyRuntime', () => ({
                view: 'editor',
                filename: 'index.html',
                rawCode: '',
                editingId: null,
                isBuilding: false,
                previewMode: false,
                activeProject: null,
                projects: JSON.parse(localStorage.getItem('harmony_v10') || '[]'),
                registry: {}, // Stores Blob URLs

                async deploy() {
                    this.isBuilding = true;
                    await new Promise(r => setTimeout(r, 1200));

                    if (this.editingId) {
                        const idx = this.projects.findIndex(p => p.id === this.editingId);
                        this.projects[idx].name = this.filename;
                        this.projects[idx].code = this.rawCode;
                        // Revoke old URL if it exists
                        if(this.registry[this.editingId]) URL.revokeObjectURL(this.registry[this.editingId]);
                    } else {
                        const id = Date.now();
                        this.projects.unshift({
                            id,
                            name: this.filename,
                            code: this.rawCode,
                            url: `${this.filename.split('.')[0]}-${Math.random().toString(36).slice(2,7)}.harmony.dev`
                        });
                        this.editingId = id;
                    }

                    localStorage.setItem('harmony_v10', JSON.stringify(this.projects));
                    this.isBuilding = false;
                    this.openProject(this.projects.find(p => p.id === this.editingId));
                    this.resetEditor();
                },

                openProject(p) {
                    this.activeProject = p;
                    this.previewMode = true;

                    // Revoke old URL for this specific project
                    if(this.registry[p.id]) URL.revokeObjectURL(this.registry[p.id]);

                    // Create fresh URL
                    const blob = new Blob([p.code], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    this.registry[p.id] = url;

                    this.$nextTick(() => {
                        this.$refs.viewport.src = url;
                    });
                },

                closePreview() {
                    this.previewMode = false;
                },

                editProject(p) {
                    this.editingId = p.id;
                    this.filename = p.name;
                    this.rawCode = p.code;
                    this.view = 'editor';
                },

                cancelEdit() {
                    this.resetEditor();
                    this.view = 'archive';
                },

                deleteProject(id) {
                    if(confirm('Teardown this deployment?')) {
                        if(this.registry[id]) {
                            URL.revokeObjectURL(this.registry[id]);
                            delete this.registry[id];
                        }
                        this.projects = this.projects.filter(p => p.id !== id);
                        localStorage.setItem('harmony_v10', JSON.stringify(this.projects));
                    }
                },

                resetEditor() {
                    this.editingId = null;
                    this.rawCode = '';
                    this.filename = 'index.html';
                }
            }));
        });
    </script>
</body>
</html>
